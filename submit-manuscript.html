<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Submit Manuscript | IJIRSES</title>
</head>
<body>
<!-- Same header as aims-scope.html -->

<!-- Main Content -->
<section class="py-5">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-9">
        <div class="card">
          <h2 class="card-header">Submit Manuscript</h2>
          <div class="card-body p-4">
            <div class="alert alert-info">
              <i class="fa fa-info-circle mr-2"></i> Before submitting, please ensure you have read the <a href="instructions-authors.html" class="alert-link">Author Instructions</a>.
            </div>
            
            <form id="submitManuscriptForm">
              <div class="form-group">
                <label>Manuscript Title *</label>
                <input type="text" class="form-control" required>
              </div>
              
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label>Corresponding Author *</label>
                  <input type="text" class="form-control" required>
                </div>
                <div class="form-group col-md-6">
                  <label>Email *</label>
                  <input type="email" class="form-control" required>
                </div>
              </div>
              
              <div class="form-group">
                <label>Co-authors (comma separated)</label>
                <input type="text" class="form-control">
              </div>
              
              <div class="form-group">
                <label>Article Type *</label>
                <select class="form-control" required>
                  <option value="">Select type</option>
                  <option>Original Research</option>
                  <option>Review Article</option>
                  <option>Short Communication</option>
                  <option>Case Study</option>
                </select>
              </div>
              
              <div class="form-group">
                <label>Subject Area *</label>
                <select class="form-control" required>
                  <option value="">Select area</option>
                  <optgroup label="Engineering">
                    <option>Computer Science</option>
                    <option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option>
                  </optgroup>
                  <optgroup label="Sciences">
                    <option>Physics</option>
                    <option>Chemistry</option>
                    <option>Mathematics</option>
                  </optgroup>
                </select>
              </div>
              
              <div class="form-group">
                <label>Abstract (max 300 words) *</label>
                <textarea class="form-control" rows="5" required></textarea>
              </div>
              
              <div class="form-group">
                <label>Keywords (comma separated) *</label>
                <input type="text" class="form-control" required>
              </div>
              
              <div class="form-group">
                <label>Upload Manuscript (Word/PDF) *</label>
                <input type="file" class="form-control-file" accept=".doc,.docx,.pdf" required>
                <small class="text-muted">Max file size: 10MB</small>
              </div>
              
              <div class="form-group">
                <label>Upload Supplementary Files (optional)</label>
                <input type="file" class="form-control-file" multiple>
              </div>
              
              <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="ethicsCheck" required>
                <label class="form-check-label" for="ethicsCheck">I confirm that this manuscript is original and complies with publication ethics *</label>
              </div>
              
              <button type="submit" class="btn btn-primary">Submit Manuscript</button>
            </form>
          </div>
        </div>
      </div>
      
      <!-- Sidebar -->
      <div class="col-lg-3">
        <div class="card mb-4">
          <h5 class="card-header">Submission Checklist</h5>
          <div class="card-body">
            <ul class="list-unstyled">
              <li><i class="fa fa-check-circle text-success mr-2"></i> Format ready</li>
              <li><i class="fa fa-check-circle text-success mr-2"></i> Figures separate</li>
              <li><i class="fa fa-check-circle text-success mr-2"></i> References formatted</li>
              <li><i class="fa fa-check-circle text-success mr-2"></i> Cover letter ready</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Same footer as aims-scope.html -->

<script>
$('#submitManuscriptForm').on('submit', function(e) {
  e.preventDefault();
  alert('Manuscript submitted successfully! You will receive a confirmation email shortly.');
});
</script>
</body>
</html>
