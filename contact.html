<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Contact Us | IJIRSES</title>
</head>
<body>
<!-- Same header as aims-scope.html -->

<!-- Main Content -->
<section class="py-5">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-9">
        <div class="card">
          <h2 class="card-header">Contact Us</h2>
          <div class="card-body p-4">
            <div class="row">
              <div class="col-md-6">
                <h4 class="text-primary mb-4">Editorial Office</h4>
                <p><i class="fa fa-map-marker-alt mr-2"></i> 123 Science Avenue, London, UK</p>
                <p><i class="fa fa-phone mr-2"></i> +44 20 7946 0138</p>
                <p><i class="fa fa-envelope mr-2"></i> editorial@ijirses.org</p>
                <p><i class="fa fa-clock mr-2"></i> Mon-Fri, 9:00 - 17:00 GMT</p>
              </div>
              
              <div class="col-md-6">
                <h4 class="text-primary mb-4">Technical Support</h4>
                <p><i class="fa fa-envelope mr-2"></i> support@ijirses.org</p>
                <p><i class="fa fa-phone mr-2"></i> +44 20 7946 0139</p>
              </div>
            </div>
            
            <hr class="my-4">
            
            <h4 class="text-primary mb-4">Send us a Message</h4>
            <form>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label>Name *</label>
                  <input type="text" class="form-control" required>
                </div>
                <div class="form-group col-md-6">
                  <label>Email *</label>
                  <input type="email" class="form-control" required>
                </div>
              </div>
              
              <div class="form-group">
                <label>Subject *</label>
                <input type="text" class="form-control" required>
              </div>
              
              <div class="form-group">
                <label>Message *</label>
                <textarea class="form-control" rows="5" required></textarea>
              </div>
              
              <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
          </div>
        </div>
      </div>
      
      <!-- Sidebar -->
      <div class="col-lg-3">
        <div class="card mb-4">
          <h5 class="card-header">Connect With Us</h5>
          <div class="card-body text-center">
            <a href="#" class="btn btn-primary btn-block mb-2"><i class="fab fa-facebook-f mr-2"></i> Facebook</a>
            <a href="#" class="btn btn-info btn-block mb-2"><i class="fab fa-twitter mr-2"></i> Twitter</a>
            <a href="#" class="btn btn-primary btn-block"><i class="fab fa-linkedin-in mr-2"></i> LinkedIn</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Same footer as aims-scope.html -->
</body>
</html>
